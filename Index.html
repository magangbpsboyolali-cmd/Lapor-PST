<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Aplikasi Pelaporan PST</title>
  <base target="_top">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary-color: #3b82f6;
      --primary-dark: #1e40af;
      --danger-color: #ef4444;
      --success-color: #10b981;
      --bg-color: #f3f4f6;
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--card-bg);
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 35px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
      background: #f9fafb;
      margin-bottom: 20px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid;
      display: none;
    }

    .alert-danger {
      background: #fee2e2;
      color: #991b1b;
      border-left-color: var(--danger-color);
    }

    .alert-success {
      background: #dcfce7;
      color: #166534;
      border-left-color: var(--success-color);
    }

    .alert.show {
      display: block;
    }

    .info-text {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 20px;
      line-height: 1.6;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading.show {
      display: block;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>🔐 Aplikasi Pelaporan</h1>
        <p>Pusat Statistik Terpadu BPS Boyolali</p>
      </div>

      <div id="alertContainer"></div>

      <form id="loginForm" onsubmit="prosesLogin(event)">
        <input 
          type="password" 
          id="kodeAkses" 
          class="form-input" 
          placeholder="Masukkan kode akses Anda"
          autocomplete="off"
          required
        >

        <div class="loading" id="loading">
          <div class="spinner"></div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          Masuk
        </button>
      </form>

      <div class="info-text">
        💡 Hubungi admin untuk mendapatkan kode akses
      </div>
    </div>
  </div>

  <script>
    function showAlert(message, type, container) {
      if (!container) container = document.getElementById('alertContainer');
      container.innerHTML = `<div class="alert alert-${type} show">${message}</div>`;
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }

    async function prosesLogin(event) {
      event.preventDefault();

      const kodeAkses = document.getElementById('kodeAkses').value.trim();
      const loginBtn = document.getElementById('loginBtn');
      const loading = document.getElementById('loading');
      const alertContainer = document.getElementById('alertContainer');

      if (!kodeAkses) {
        showAlert('❌ Kode akses tidak boleh kosong!', 'danger', alertContainer);
        return;
      }

      loginBtn.disabled = true;
      loading.classList.add('show');
      alertContainer.innerHTML = '';

      try {
        google.script.run
          .withSuccessHandler(function(result) {
            console.log('Login result:', result);
            if (result.success) {
              showAlert('✅ ' + result.message, 'success', alertContainer);
              setTimeout(() => {
                window.location.href = '?page=dashboard';
              }, 1000);
            } else {
              showAlert('❌ ' + result.message, 'danger', alertContainer);
              loginBtn.disabled = false;
              loading.classList.remove('show');
            }
          })
          .withFailureHandler(function(error) {
            console.log('Error:', error);
            showAlert('❌ Error: ' + error, 'danger', alertContainer);
            loginBtn.disabled = false;
            loading.classList.remove('show');
          })
          .cekKodeAkses(kodeAkses);
      } catch (error) {
        console.log('Exception:', error);
        showAlert('❌ Terjadi kesalahan sistem', 'danger', alertContainer);
        loginBtn.disabled = false;
        loading.classList.remove('show');
      }
    }
  </script>
</body>
</html>
